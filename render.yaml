services:
  - type: web
    name: deudometro-api
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pnpm install && pnpm db:generate && pnpm build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false
