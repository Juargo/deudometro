services:
  - type: web
    name: deudometro-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm i -g pnpm && pnpm install --frozen-lockfile && pnpm db:generate && pnpm build:backend
    startCommand: node packages/backend/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false
